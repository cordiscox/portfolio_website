name: Deploy static site

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      BUILD_DIR: build
      VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
      VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
      VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          if npm run | grep -qE '^  lint$'; then
            npm run lint
          else
            echo "No lint script configured; skipping."
          fi

      - name: Build
        run: npm run build

      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -d "${BUILD_DIR}"
          : "${AWS_ROLE_ARN:?Set the AWS_ROLE_ARN repository variable}"
          : "${S3_BUCKET:?Set the S3_BUCKET repository variable}"
          : "${CLOUDFRONT_DISTRIBUTION_ID:?Set the CLOUDFRONT_DISTRIBUTION_ID repository variable}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets
        run: |
          set -euo pipefail
          aws s3 sync "${BUILD_DIR}/" "s3://${S3_BUCKET}" --delete \
            --cache-control "public,max-age=3600" \
            --exclude "index.html" \
            --exclude "assets/*"

          if [ -d "${BUILD_DIR}/assets" ]; then
            aws s3 sync "${BUILD_DIR}/assets/" "s3://${S3_BUCKET}/assets" --delete \
              --cache-control "public,max-age=31536000,immutable"
          fi

          aws s3 cp "${BUILD_DIR}/index.html" "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
